name: Update publications

# Runs on GitHub's servers, so your own machine can be off.
on:
  schedule:
    # Once a day at 06:00 UTC. GitHub may delay a run when it is busy.
    # To change how often it runs, swap this line for:
    #   - cron: "0 6 * * 1"    once a week, Monday 06:00 UTC
    #   - cron: "0 * * * *"    every hour
    - cron: "0 6 * * *"
  # Lets you also trigger it by hand from the Actions tab.
  workflow_dispatch:

# Needed so the job can push the refreshed content back to the repository.
permissions:
  contents: write

# If a run is still going when the next hour comes round, skip the new one
# rather than having two jobs push at once.
concurrency:
  group: update-publications
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Fetch publications and metrics from INSPIRE-HEP
        run: python3 tools/update.py

      - name: Commit and push if anything changed
        run: |
          if git diff --quiet; then
            echo "Nothing changed — no commit."
            exit 0
          fi
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Refresh publications and metrics from INSPIRE-HEP"
          git push
